<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Cart | ECommerce</title>
</head>
<body>
  <header class="navbar">
    <div class="logo">
      <h2>Company Logo</h2>
      <img src="images/logo.png" alt="Company Logo">
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </nav>
    <input type="text" placeholder="Search...">
  </header>
  <main>
    <section class="cart">
      <h2>Your Cart</h2>
      <div class="cart-items">
        <!-- Cart items will be dynamically added here -->
        <div class="cart-item">
          <img src="images/headphones.png" alt="Wireless Headphones">
          <h3>Wireless Headphones</h3>
          <p>Rs. 5,000</p>
          <input type="number" value="1" min="1">
          <button>Remove</button>
        </div>
      </div>
      <div class="cart-total">
        <h3>Total: Rs. 5,000</h3>
        <button onclick="location.href='checkout.html'">Proceed to Checkout</button>
      </div>
	  <button>Remove</button>
  </div>
  <div class="cart-item">
    <img src="images/smartwatch.png" alt="Smartwatch">
    <h3>Smartwatch</h3>
    <p>Rs. 8,000</p>
    <div class="quantity">
      <button class="qty-btn" onclick="updateQuantity(-1)">▼</button>
      <input type="number" value="1" min="1" class="qty-input">
      <button class="qty-btn" onclick="updateQuantity(1)">▲</button>
    </div>
    <button>Remove</button>
  </div>
  <div class="cart-item">
    <img src="images/laptop.png" alt="Laptop">
    <h3>Laptop</h3>
    <p>Rs. 50,000</p>
    <div class="quantity">
      <button class="qty-btn" onclick="updateQuantity(-1)">▼</button>
      <input type="number" value="1" min="1" class="qty-input">
      <button class="qty-btn" onclick="updateQuantity(1)">▲</button>
    </div>
    <button>Remove</button>
	</div>
</div>

    </section>
  </main>
  <footer class="footer">
    <!-- Footer content -->
  </footer>
  <script src="script.js"></script>
</body>
</html>
